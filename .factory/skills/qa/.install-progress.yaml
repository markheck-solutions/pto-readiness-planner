  personas:
    selection: use_detected_personas
    roles:
      - name: sdm-reviewer
        can_do:
          - Review first-visit manager value and queue context.
          - Check coverage risk language and next actions.
        cannot_do:
          - Require login or credentials.
          - View real/private staffing data.
          - Persist HR decisions.
      - name: operations-manager
        can_do:
          - Review queue triage, filters, heatmap, detail, evidence, browser-only decisions, and drafts.
        cannot_do:
          - Create persistent production data.
          - Trigger server-side decision writes.
          - Carry stale evidence between request contexts.
      - name: it-security-reviewer
        can_do:
          - Review no-auth posture, read-only APIs, controlled errors, repo secret safety, and mock draft behavior.
        cannot_do:
          - Print or store secret values.
          - Enable private local AI checks in default QA.
          - Accept provider overrides or expose stack traces/private details.
      - name: keyboard-user
        can_do:
          - Review keyboard navigation, focus recovery, and accessible state changes.
        cannot_do:
          - Get trapped in interactive UI.
          - Lose visible focus after drawers, filters, or previews.
