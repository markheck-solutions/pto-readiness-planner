name: Bug report
description: Report a reproducible problem in the Team Coverage and PTO Readiness Planner.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that shows the problem.
      placeholder: |
        1. Go to ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Overview
        - Request queue
        - Heatmap
        - Request detail
        - Evidence
        - Drafting
        - API
        - Data seed
        - CI
        - Other
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation notes
      description: Include commands, screenshots, or logs. Do not include secrets.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checks
      options:
        - label: I did not include secret values, `.env.local` contents, or private URLs.
          required: true
        - label: I did not include real employee, company, customer, schedule, HR, medical, compensation, performance, or confidential staffing data.
          required: true
