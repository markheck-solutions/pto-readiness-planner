name: ci

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Demo safety scan
        run: npm run safety

      - name: Quality gates
        run: npm run quality:check

      - name: Docs and template verification
        run: npm run readme:verify

      - name: Readiness report
        run: npm run readiness-report
