name: ci

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pto_readiness
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Complexity check
        run: npm run complexity:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (coverage)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Demo safety scan
        run: npm run safety

      - name: SQL supportability gate
        env:
          SQL_GATE_DB: pto_readiness
          SQL_GATE_HOST: localhost
          SQL_GATE_PASSWORD: postgres
          SQL_GATE_SCHEME: postgresql
          SQL_GATE_USER: postgres
        run: |
          export SQL_GATE_DATABASE_URL="${SQL_GATE_SCHEME}://${SQL_GATE_USER}:${SQL_GATE_PASSWORD}@${SQL_GATE_HOST}:5432/${SQL_GATE_DB}"
          npm run sql:check

      - name: Quality gates
        run: npm run quality:check

      - name: Docs and template verification
        run: npm run readme:verify

      - name: Readiness report
        run: npm run readiness-report
