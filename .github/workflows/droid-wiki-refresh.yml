name: Droid Wiki Refresh

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wiki-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
      FACTORY_DROID_VERSION: "0.139.0"
      NEXT_PUBLIC_DEMO_MODE: "true"
      AI_PROVIDER: mock
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check Factory integration availability
        id: factory
        run: |
          if [ -z "${FACTORY_API_KEY}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::FACTORY_API_KEY is not configured. Skipping wiki refresh."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node
        if: steps.factory.outputs.skip == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.factory.outputs.skip == 'false'
        run: npm ci

      - name: Verify pinned Factory Droid CLI
        if: steps.factory.outputs.skip == 'false'
        run: npm exec --yes --package=@factory/cli@${FACTORY_DROID_VERSION} -- droid --version

      - name: Configure git identity for wiki sync
        if: steps.factory.outputs.skip == 'false'
        run: |
          git config --global user.name "factory-droid[bot]"
          git config --global user.email "138933559+factory-droid[bot]@users.noreply.github.com"

      - name: Generate wiki
        if: steps.factory.outputs.skip == 'false'
        id: generate-wiki
        run: |
          set -o pipefail
          set +e
          npm exec --yes --package=@factory/cli@${FACTORY_DROID_VERSION} -- droid exec --cwd "$GITHUB_WORKSPACE" --auto high "/wiki" 2>&1 | tee droid-wiki-output.log
          wiki_status=$?
          set -e
          if grep -Fq "GitHub wiki sync failed" droid-wiki-output.log; then
            echo "::error::GitHub wiki sync failed. Review the droid-wiki-output artifact."
            exit 1
          fi
          exit "$wiki_status"

      - name: Report wiki refresh failure
        if: failure() && steps.factory.outputs.skip == 'false' && steps.generate-wiki.outcome == 'failure'
        run: |
          echo "::warning::Factory Wiki refresh failed. Review the droid-wiki-output artifact and confirm the repository integration is still healthy."

      - name: Upload wiki diagnostics
        if: always() && steps.factory.outputs.skip == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: droid-wiki-output
          path: droid-wiki-output.log
          if-no-files-found: warn
          retention-days: 14
